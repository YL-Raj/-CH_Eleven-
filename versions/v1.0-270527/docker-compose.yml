services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ch_eleven}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-ch_eleven}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ch-eleven-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ch_eleven}
      PORT: 3001
      MAX_ENTRIES: ${MAX_ENTRIES:-100}
      ADMIN_SECRET: ${ADMIN_SECRET:?Set ADMIN_SECRET in .env}
      DEBUG: "false"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ch-eleven-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ocr-service:
    build: ./ocr-service
    restart: unless-stopped
    environment:
      ADMIN_SECRET: ${ADMIN_SECRET:?Set ADMIN_SECRET in .env}
      OCR_PORT: 5000
      DEBUG: "false"
    expose:
      - "5000"
    networks:
      - ch-eleven-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health | grep -q healthy"]
      interval: 15s
     